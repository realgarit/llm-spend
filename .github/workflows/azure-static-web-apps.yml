name: Azure Static Web Apps CI/CD

# Deploy the hybrid Next.js app to Azure Static Web Apps (Free tier) on push to main.
# The Azure/static-web-apps-deploy action builds with Oryx using the config below.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # Next.js requires Node 20+. Oryx also honors the "engines" field in
      # package.json (>=20) for its own internal build step.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Pin Oryx's build Node. package.json engines is "20.x"; this is the
          # belt-and-braces guard so Oryx never resolves to an unsupported 24.x.
          NODE_VERSION: "20"
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Enables PR comments / GitHub integration
          action: "upload"
          # Hybrid Next.js on SWA: app at repo root, no separate API, and
          # output_location MUST be empty (do not set "out" — that is static export).
          app_location: "/"
          api_location: ""
          output_location: ""
